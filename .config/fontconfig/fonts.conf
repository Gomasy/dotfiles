<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <match target="font">
    <test name="family" compare="contains">
      <string>Anonymous Pro for Powerline</string>
    </test>
    <edit name="hintstyle" mode="assign">
      <const>hintlight</const>
    </edit>
  </match>
</fontconfig>
