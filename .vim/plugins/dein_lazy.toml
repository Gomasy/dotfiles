[[plugins]]
repo = 'Shougo/dein.vim'

[[plugins]]
repo = 'Shougo/neocomplete.vim'
on_event = 'InsertEnter'
hook_add = '''
  let g:neocomplete#enable_at_startup = 1
  let g:neocomplete#enable_auto_delimiter = 1
  let g:neocomplete#enable_smart_case = 1
  let g:neocomplete#min_keyword_length = 3

  if !exists('g:neocomplete#force_omni_input_patterns')
    let g:neocomplete#force_omni_input_patterns = {}
  endif

  let g:neocomplete#force_omni_input_patterns.c = '[^.[:digit:] *\t]\%(\.\|->\)'
  let g:neocomplete#force_omni_input_patterns.cpp = '[^.[:digit:] *\t]\%(\.\|->\)\|\h\w*::'
  let g:neocomplete#force_omni_input_patterns.php = '[^. \t]->\h\w*\|\h\w*::'
  let g:neocomplete#force_omni_input_patterns.ruby = '[^. *\t]\.\w*\|\h\w*::'

  if !exists('g:neocomplete#text_mode_filetypes')
    let g:neocomplete#text_mode_filetypes = {}
  endif

  let g:neocomplete#text_mode_filetypes = {
    \ 'gitrebase': 1,
    \ 'gitcommit': 1,
    \ 'markdown': 1,
    \ 'hybrid' : 1,
    \ 'text': 1,
    \ 'help': 1,
    \ }
'''

[[plugins]]
repo = 'Shougo/neosnippet.vim'
on_event = 'InsertEnter'
on_ft = ['snippet']
depends = ['neosnippet-snippets']
hook_add = '''
  inoremap <expr><S-TAB> pumvisible() ? "\<C-p>" : "\<S-TAB>"
  imap <silent><C-k> <ESC>:let g:neosnippet_expanding_or_jumpping = 1<CR>a<Plug>(neosnippet_expand_or_jump)
  smap <C-k> <Plug>(neosnippet_expand_or_jump)
  imap <expr><TAB> pumvisible() ? "\<C-n>" : neosnippet#jumpable() ? "\<Plug>(neosnippet_expand_or_jump)" : "\<TAB>"
  smap <expr><TAB> neosnippet#jumpable() ? "\<Plug>(neosnippet_expand_or_jump)" : "\<TAB>"
'''

[[plugins]]
repo = 'Shougo/neosnippet-snippets'

[[plugins]]
repo = 'w0rp/ale'
on_ft = ['c', 'cpp', 'css', 'javascript', 'json', 'php', 'ruby', 'scss']
hook_add = '''
let g:ale_set_loclist = 0
let g:ale_set_quickfix = 1
let g:ale_open_list = 1
let g:ale_keep_list_window_open = 1
let g:ale_list_window_size = 5
let g:ale_sign_column_always = 1
'''

[[plugins]]
repo = 'scrooloose/nerdtree'
hook_add = '''
  nnoremap <silent><C-f> :NERDTreeTabsToggle<CR>
  autocmd bufenter * if winnr('$') == 1 && exists('b:NERDTree') && b:NERDTree.isTabTree() | q | endif

  let g:NERDTreeShowHidden = 1
  if winwidth(0) < 128
    let g:NERDTreeWinSize = 25
  endif
'''

[[plugins]]
repo = 'Xuyuanp/nerdtree-git-plugin'

[[plugins]]
repo = 'jistr/vim-nerdtree-tabs'

[[plugins]]
repo = 'thinca/vim-quickrun'
hook_add = '''
  nnoremap <silent><C-r> :QuickRun<CR>
  let g:quickrun_config = {
    \   '_': {
    \     'runner': 'vimproc',
    \     'runner/vimproc/updatetime': 60,
    \     'outputter': 'error',
    \     'outputter/error/success': 'buffer',
    \     'outputter/error/error': 'quickfix',
    \     'outputter/buffer/split': 'rightbelow 8sp',
    \     'outputter/buffer/close_on_empty' : 1,
    \     'hook/time/enable': 1,
    \   },
    \   'markdown': {
    \     'type': 'markdown/kramdown',
    \     'outputter': 'browser',
    \     'hook/time/enable': 0,
    \   },
    \ }
'''

[[plugins]]
repo = 'tpope/vim-endwise'
on_event = 'InsertEnter'

[[plugins]]
repo = 'posva/vim-vue'
on_ft = ['vue']
hook_add = '''
  autocmd FileType vue syntax sync fromstart
'''

[[plugins]]
repo = 'digitaltoad/vim-pug'
on_ft = ['pug']

[[plugins]]
repo = 'cespare/vim-toml'
on_ft = ['toml']

[[plugins]]
repo = 'tyru/open-browser.vim'
on_ft = ['markdown']

[[plugins]]
repo = 'AndrewRadev/switch.vim'
hook_add = 'nnoremap <silent>t :Switch<CR>'

[[plugins]]
repo = 'lilydjwg/colorizer'
on_ft = ['css', 'html', 'scss']

[[plugins]]
repo = 'ujihisa/neco-look'
on_event = 'InsertEnter'

[[plugins]]
repo = 'vim-jp/vimdoc-ja'
